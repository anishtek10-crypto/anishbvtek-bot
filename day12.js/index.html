<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
    <h2>To-Do App</h2>
    <div class="input-row">
        <input type="text" id="todo-input" placeholder="Enter task">
        <input type="time" id="time-input">
        <button class="add-button" onclick="addTodo()">Add</button>
        <button class ="sort-button" onclick = "sortByName()">sort</button>
    </div>
    <p id ="error-message"></p>
    <ul id="todo-list"></ul>
</div>
<script src="app.js"></script>
</body>
</html>
